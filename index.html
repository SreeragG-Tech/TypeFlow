<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeFlow - Premium Typing Experience</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* APPLE-ESQUE EASING VARIABLES */
        :root {
            --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --ease-heavy: cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes pulse-cursor {
            0%, 100% { border-color: transparent; background-color: transparent; }
            50% { border-color: #6366f1; background-color: rgba(99, 102, 241, 0.15); }
        }
        .cursor-active {
            animation: pulse-cursor 1s step-end infinite;
            border-bottom-width: 3px;
        }
        
        #text-display {
            line-height: 3.2rem;
            background-image: repeating-linear-gradient(
                transparent,
                transparent 3.1rem,
                rgba(51, 65, 85, 0.3) 3.1rem,
                rgba(51, 65, 85, 0.3) 3.2rem
            );
        }

        /* --- HEAVY INTERACTION ANIMATIONS --- */
        
        /* The physical pop of a correct keystroke */
        @keyframes typePop {
            0% { transform: scale(1); filter: brightness(1); }
            40% { transform: scale(1.18) translateY(-2px); filter: brightness(1.4); }
            100% { transform: scale(1) translateY(0); filter: brightness(1); }
        }

        /* The violent shake of an error */
        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px) rotate(-4deg); }
            40% { transform: translateX(5px) rotate(4deg); }
            60% { transform: translateX(-3px) rotate(-2deg); }
            80% { transform: translateX(3px) rotate(2deg); }
        }

        /* Smoothly sliding finished lines away */
        @keyframes slideUpFade {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-15px) scale(0.98); }
        }

        /* The glassmorphism start reveal */
        @keyframes blurFadeOut {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.03); visibility: hidden; }
        }

        /* The subtle breathing glow while typing */
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 0px 0px rgba(99, 102, 241, 0); border-color: rgba(99, 102, 241, 0.3); }
            50% { box-shadow: 0 0 30px 0px rgba(99, 102, 241, 0.15); border-color: rgba(99, 102, 241, 0.6); }
        }

        /* Subtle pop for metrics changing */
        @keyframes metricPop {
            0% { transform: scale(1); filter: brightness(1); }
            30% { transform: scale(1.15); filter: brightness(1.4); text-shadow: 0 0 12px currentColor; }
            100% { transform: scale(1); filter: brightness(1); text-shadow: none; }
        }

        /* Minimal tick for frequent updates (WPM, Time) */
        @keyframes metricSubtle {
            0% { transform: scale(1); filter: brightness(1); }
            30% { transform: scale(1.04); filter: brightness(1.2); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        /* Cinematic Achievement Screen */
        @keyframes dramaticPop {
            0% { opacity: 0; transform: scale(0.92) translateY(30px); filter: blur(8px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        /* Cascading error cards */
        @keyframes staggerCard {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* View transition */
        .view-enter {
            animation: dramaticPop 0.6s var(--ease-heavy) forwards;
        }

        /* Upgraded Error Tooltip */
        .char[data-error]::after {
            content: attr(data-error);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 2px;
            background-color: #e11d48; 
            color: #ffffff;
            font-size: 0.9rem;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 6px;
            box-shadow: 0 6px 16px rgba(225, 29, 72, 0.5);
            z-index: 50;
            animation: tooltipPop 0.35s var(--ease-spring) forwards;
            pointer-events: none;
            white-space: pre;
        }
        @keyframes tooltipPop {
            0% { opacity: 0; transform: translate(-50%, 12px) scale(0.7); }
            50% { transform: translate(-50%, -4px) scale(1.15); }
            100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
        }
        
        /* Subtle float for start button */
        @keyframes floatIdle {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
        }
        .float-anim { animation: floatIdle 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-indigo-500/30 min-h-screen flex items-center justify-center p-4 overflow-x-hidden">

    <div class="max-w-4xl w-full flex flex-col gap-8">

                </button>

                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>

                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 13.5V4a2 2 0 0 1 2-2h8.5L20 7.5V20a2 2 0 0 1-2 2h-5.5"/><polyline points="14 2 14 8 20 8"/><path d="M10.42 12.61a2.1 2.1 0 1 1 2.97 2.97L7.95 21 4 22l.99-3.95 5.43-5.44Z"/></svg>
                    Custom Text <kbd class="px-1.5 py-0.5 bg-slate-800 border border-slate-700 text-slate-400 rounded text-[0.65rem] ml-1 font-mono shadow-sm">Space</kbd>
                </button>
            </div>
        </header>

        <!-- Custom Text View -->
        <div id="view-custom" class="hidden bg-slate-900 rounded-2xl p-8 border border-slate-800 shadow-2xl">
            <h2 class="text-xl font-semibold mb-4 text-slate-100">Paste your custom text</h2>
            <p class="text-slate-400 mb-6 text-sm">Create your own practice session by pasting scripts, JSON, or complex queries.</p>
            
            <textarea id="custom-input-area" class="w-full h-64 bg-slate-950 border border-slate-700 rounded-xl p-4 text-slate-300 font-mono text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none transition-all shadow-inner" placeholder="Paste text here..."></textarea>
            
            <div class="flex justify-end mt-6 gap-4">
                <button type="button" id="btn-cancel-custom" class="px-6 py-2 rounded-lg font-medium text-slate-400 hover:text-slate-200 hover:bg-slate-800 transition-colors">Cancel</button>
                <button type="button" id="btn-apply-custom" class="px-6 py-2 rounded-lg font-medium bg-indigo-600 hover:bg-indigo-500 text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-indigo-500/20">Apply & Start Typing</button>
            </div>
        </div>

        <!-- Practice View -->
        <div id="view-practice" class="flex flex-col gap-6 view-enter">
            
            <!-- Real-time Metrics Dashboard -->
            <div class="flex gap-4 mb-2">
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 flex-1 flex flex-col items-center justify-center shadow-lg backdrop-blur-md transition-all hover:border-slate-700">
                    <span class="text-slate-500 text-sm font-semibold flex items-center gap-1 uppercase tracking-wider mb-1">WPM</span>
                    <span id="display-wpm" class="text-4xl font-bold text-indigo-400 inline-block origin-center">0</span>
                </div>
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 flex-1 flex flex-col items-center justify-center shadow-lg backdrop-blur-md transition-all hover:border-slate-700">
                    <span class="text-slate-500 text-sm font-semibold flex items-center gap-1 uppercase tracking-wider mb-1">Accuracy</span>
                    <span id="display-acc" class="text-4xl font-bold text-emerald-400 inline-block origin-center">100%</span>
                </div>
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 flex-1 flex flex-col items-center justify-center shadow-lg backdrop-blur-md transition-all hover:border-slate-700">
                    <span class="text-slate-500 text-sm font-semibold flex items-center gap-1 uppercase tracking-wider mb-1">Time</span>
                    <span id="display-time" class="text-4xl font-bold text-slate-200 inline-block origin-center">0s</span>
                </div>
            </div>

            <!-- Typing Canvas Container -->

                <textarea id="hidden-type-input" class="absolute inset-0 w-full h-full opacity-0 z-20 cursor-text resize-none overflow-hidden" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>

                <!-- Status Overlay when Idle -->
                <div id="overlay-idle" class="absolute inset-0 flex items-center justify-center bg-slate-900/20 z-30 pointer-events-none rounded-2xl">
                    <span class="float-anim bg-slate-800/90 text-slate-200 px-6 py-4 rounded-2xl font-sans text-sm font-medium border border-slate-700/80 shadow-2xl shadow-indigo-500/10 flex items-center gap-3 backdrop-blur-md">
                        <svg class="text-indigo-400" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                        <span class="text-[0.95rem]">Press <kbd class="px-2.5 py-1 mx-1.5 bg-indigo-500/20 border border-indigo-500/40 text-indigo-300 rounded-md font-mono font-bold shadow-sm">Enter ↵</kbd> to reveal text</span>
                    </span>
                </div>

                <!-- Rendered Text -->
                <div id="text-display" class="w-full select-none z-10 pointer-events-none min-h-[160px] relative" style="filter: blur(7px); opacity: 0.4;"></div>

                <!-- Finished Cinematic Overlay -->
                <div id="overlay-finished" class="hidden absolute inset-0 bg-slate-900/80 backdrop-blur-xl z-30 rounded-2xl overflow-y-auto">
                    <div id="finish-content" class="flex flex-col items-center justify-center min-h-full p-4 sm:p-6 gap-3 sm:gap-4">
                        <h3 class="text-3xl sm:text-4xl font-bold text-emerald-400 shrink-0 drop-shadow-lg tracking-tight mb-2">Test Complete!</h3>
                        
                        <div id="error-feedback" class="hidden w-full max-w-lg shrink-0"></div>
                        
                        <!-- Next Level Button -->
                        <button type="button" id="btn-next-level" style="animation: staggerCard 0.6s var(--ease-out-expo) 0.3s both;" class="group flex items-center gap-2 sm:gap-3 bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 sm:px-8 sm:py-3.5 rounded-xl font-bold text-base sm:text-lg transition-all shadow-lg shadow-indigo-500/25 hover:shadow-indigo-500/40 hover:-translate-y-1 cursor-pointer shrink-0 mt-2">
                            Next Level
                            <svg class="group-hover:translate-x-1.5 transition-transform duration-300" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer Controls -->
            <div class="flex justify-center mt-4">
                <button type="button" id="btn-restart" class="group flex items-center gap-2 text-slate-500 hover:text-slate-200 transition-colors font-medium text-sm px-5 py-2.5 rounded-xl hover:bg-slate-800 border border-transparent hover:border-slate-700 shadow-sm" title="Shortcut: Enter">
                    <svg class="group-hover:-rotate-180 transition-transform duration-500" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    Restart Test <kbd class="px-1.5 py-0.5 bg-slate-900 border border-slate-700 text-slate-500 group-hover:text-slate-300 rounded text-[0.65rem] ml-1.5 font-mono shadow-sm transition-colors">↵ Enter</kbd>
                </button>
            </div>
            
        </div>
    </div>

    <!-- MAIN JAVASCRIPT LOGIC -->
    <script>
        // --- SOUND ENGINE ---
        const SoundManager = {
            ctx: null,
            muted: false,
            init() {
                if (!this.ctx && !this.muted) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx && this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            toggle() {
                this.muted = !this.muted;
                document.getElementById('icon-sound-on').classList.toggle('hidden', this.muted);
                document.getElementById('icon-sound-off').classList.toggle('hidden', !this.muted);
                if (!this.muted) this.init();
            },
            playKey(char) {
                if (!this.ctx || this.muted) return;
                const t = this.ctx.currentTime;
                
                let baseFreq = 400;
                if (char === ' ') baseFreq = 220; 
                else if (char === 'backspace') baseFreq = 280;
                else if (char === '\n') baseFreq = 200;
                else if (char) {
                    const code = char.toLowerCase().charCodeAt(0);
                    if (code >= 97 && code <= 122) baseFreq = 350 + ((code - 97) * 4);
                    else if (code >= 48 && code <= 57) baseFreq = 300 + ((code - 48) * 5); 
                    else baseFreq = 480; 
                }

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(baseFreq, t);
                osc.frequency.exponentialRampToValueAtTime(80, t + 0.05);

                gain.gain.setValueAtTime(0.25, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);

                const popOsc = this.ctx.createOscillator();
                const popGain = this.ctx.createGain();
                popOsc.type = 'square';
                popOsc.frequency.setValueAtTime(1200, t);
                popGain.gain.setValueAtTime(0.03, t);
                popGain.gain.exponentialRampToValueAtTime(0.001, t + 0.02);

                osc.connect(gain);
                gain.connect(this.ctx.destination);
                popOsc.connect(popGain);
                popGain.connect(this.ctx.destination);

                osc.start(t);
                osc.stop(t + 0.05);
                popOsc.start(t);
                popOsc.stop(t + 0.02);
            },
            playError() {
                if (!this.ctx || this.muted) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(60, t + 0.12); 
                
                gain.gain.setValueAtTime(0.18, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(t);
                osc.stop(t + 0.12);
            },
            playSuccess() {
                if (!this.ctx || this.muted) return;
                const t = this.ctx.currentTime;
                const notes = [523.25, 659.25, 783.99, 1046.50]; 
                notes.forEach((freq, i) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, t + i * 0.08);
                    
                    gain.gain.setValueAtTime(0, t + i * 0.08);
                    gain.gain.linearRampToValueAtTime(0.15, t + i * 0.08 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.6);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(t + i * 0.08);
                    osc.stop(t + i * 0.08 + 0.6);
                });
            }
        };

        const DEFAULT_SLOTS = [
            "WITH active_users AS (SELECT user_id, last_login FROM prod_db.users WHERE status = 'active' AND is_deleted = false) SELECT COUNT(1) FROM active_users;",
            "def clean_data(df: pd.DataFrame) -> pd.DataFrame:\n    df['timestamp'] = pd.to_datetime(df['timestamp'], unit='ms')\n    return df.dropna(subset=['user_id', 'event_type'])",
            "{\n  \"pipeline\": \"user_events\",\n  \"source_kafka_topic\": \"raw-telemetry-v2\",\n  \"sink_s3_path\": \"s3a://data-lake/bronze/users/\",\n  \"batch_size\": 5000\n}",
            "aws s3 cp s3://prod-logs/2026/06/23/ - | gzip -d | grep -i \"OutOfMemoryError\" | awk '{print $1, $2, $7}' >> oom_report_0623.txt",
            "df.withColumn(\"extracted_id\", regexp_extract(col(\"raw_json\"), \"\\\"user_id\\\":\\s*\\\"([a-zA-Z0-9_-]{16})\\\"\", 1)).filter(col(\"extracted_id\") != \"\")",
            "// Your custom text will be saved here permanently. Press 'Space' to edit!"
        ];
        
        let textSlots;
        try {
            textSlots = JSON.parse(localStorage.getItem('typeflow_de_slots_v1'));
        } catch (e) {
            console.warn("Storage restricted", e);
        }
        
        if (!textSlots || textSlots.length !== 6) textSlots = [...DEFAULT_SLOTS];

        // State
        let currentSlotIndex = 0; 
        let targetText = textSlots[currentSlotIndex];
        let inputText = "";
        let status = "hidden"; 
        let timeElapsed = 0;
        let timer = null;
        let currentErrorChar = null;
        let totalErrors = 0;
        let errorTracker = {}; 
        let missedIndices = new Set(); 
        
        let lastWpm = -1;
        let lastAcc = -1;
        let lastTime = "";

        // DOM Elements
        const elInput = document.getElementById('hidden-type-input');
        const elTextDisplay = document.getElementById('text-display');
        const elWpm = document.getElementById('display-wpm');
        const elAcc = document.getElementById('display-acc');
        const elTime = document.getElementById('display-time');
        const elOverlayIdle = document.getElementById('overlay-idle');
        const elOverlayFinished = document.getElementById('overlay-finished');
        const elTypingContainer = document.getElementById('typing-container');
        const viewPractice = document.getElementById('view-practice');
        const viewCustom = document.getElementById('view-custom');
        const customTextarea = document.getElementById('custom-input-area');
        const levelSelector = document.getElementById('level-selector');
        
        function init() {
            levelSelector.value = currentSlotIndex;
            buildDOM();
            updateDOMClasses();
            elInput.addEventListener('input', handleTyping);
            
            const initAudio = () => { 
                SoundManager.init(); 
                document.removeEventListener('keydown', initAudio); 
                document.removeEventListener('click', initAudio); 
            };
            document.addEventListener('keydown', initAudio);
            document.addEventListener('click', initAudio);

            document.addEventListener('keydown', (e) => {
                if (!viewCustom.classList.contains('hidden')) return;

                if (e.code === 'Space' && (status === 'hidden' || status === 'finished')) {
                    e.preventDefault();
                    switchMode('custom');
                    return;
                }

                if (e.key === 'Enter') {
                    if (status === 'finished') {
                        e.preventDefault(); 
                        resetTest();
                    } else if (status === 'hidden') {
                        e.preventDefault(); 
                        status = 'idle'; 
                        elInput.value = '';
                        elOverlayIdle.style.animation = 'blurFadeOut 0.5s var(--ease-heavy) forwards';
                        
                        // --- UNBLUR TEXT ANIMATION ---
                        elTextDisplay.style.transition = 'filter 0.8s var(--ease-out-expo), opacity 0.8s var(--ease-out-expo)';
                        elTextDisplay.style.filter = 'blur(0px)';
                        elTextDisplay.style.opacity = '1';
                        
                        SoundManager.playKey(' '); 
                        elInput.focus();
                    }
                }
            });

            levelSelector.addEventListener('change', (e) => {
                currentSlotIndex = parseInt(e.target.value);
                targetText = textSlots[currentSlotIndex];
                if (!viewCustom.classList.contains('hidden')) switchMode('practice');
                else resetTest();
            });

            document.getElementById('btn-restart').addEventListener('click', resetTest);
            document.getElementById('btn-sound-toggle').addEventListener('click', () => SoundManager.toggle());
            
            // Next Level Progression Trigger
            document.getElementById('btn-next-level').addEventListener('click', () => {
                currentSlotIndex = (currentSlotIndex + 1) % textSlots.length;
                levelSelector.value = currentSlotIndex.toString();
                targetText = textSlots[currentSlotIndex];
                resetTest();
            });

            document.getElementById('nav-practice').addEventListener('click', () => switchMode('practice'));
            document.getElementById('nav-custom').addEventListener('click', () => switchMode('custom'));
            document.getElementById('btn-cancel-custom').addEventListener('click', () => switchMode('practice'));
            document.getElementById('btn-apply-custom').addEventListener('click', applyCustomText);

            elTypingContainer.addEventListener('click', () => {
                if(status !== 'finished') elInput.focus();
            });
            customTextarea.addEventListener('input', () => {
                document.getElementById('btn-apply-custom').disabled = !customTextarea.value.trim();
            });
        }

        function applyCustomText() {
            let raw = customTextarea.value.trim();
            let cleaned = raw.replace(/\r\n/g, '\n').replace(/\t/g, ' ');
            cleaned = cleaned.replace(/ {2,}/g, ' ');
            cleaned = cleaned.replace(/ \n/g, '\n').replace(/\n /g, '\n');
            
            if (cleaned) {
                targetText = cleaned;
                textSlots[5] = cleaned;
                currentSlotIndex = 5;
                levelSelector.value = "5"; 
                
                // Defensive try/catch to prevent the browser from halting JS execution 
                // if local storage is disabled by security settings
                try {
                    localStorage.setItem('typeflow_de_slots_v1', JSON.stringify(textSlots));
                } catch (e) {
                    console.warn("Storage restricted - custom text applied temporarily", e);
                }
                
                switchMode('practice');
            }
        }

        function handleTyping(e) {
            if (status === 'finished') {
                elInput.value = inputText; 
                return;
            }

            let val = e.target.value;

            if (status === 'hidden') {
                if (val.includes('\n')) {
                    status = 'idle'; 
                    elInput.value = ''; 
                    elOverlayIdle.style.animation = 'blurFadeOut 0.5s var(--ease-heavy) forwards';
                    
                    // --- UNBLUR TEXT ANIMATION ---
                    elTextDisplay.style.transition = 'filter 0.8s var(--ease-out-expo), opacity 0.8s var(--ease-out-expo)';
                    elTextDisplay.style.filter = 'blur(0px)';
                    elTextDisplay.style.opacity = '1';
                        
                    SoundManager.playKey(' '); 
                    return;
                } else if (val.length > 0 && val[0] === targetText[0]) {
                    status = 'idle'; 
                    elOverlayIdle.style.animation = 'blurFadeOut 0.5s var(--ease-heavy) forwards';
                    
                    // --- UNBLUR TEXT ANIMATION ---
                    elTextDisplay.style.transition = 'filter 0.8s var(--ease-out-expo), opacity 0.8s var(--ease-out-expo)';
                    elTextDisplay.style.filter = 'blur(0px)';
                    elTextDisplay.style.opacity = '1';
                } else if (val.length > 0) {
                    elInput.value = '';
                    SoundManager.playError();
                    return;
                }
            }

            if (status === 'idle' && val.length > 0) {
                status = 'typing';
                elTypingContainer.style.animation = 'pulseGlow 3s infinite';
                
                timer = setInterval(() => {
                    timeElapsed++;
                    updateMetrics();
                }, 1000);
            }

            if (val.length < inputText.length) {
                inputText = val;
                currentErrorChar = null;
                SoundManager.playKey('backspace');
            } else if (val.length > inputText.length) {
                let addedChars = val.slice(inputText.length);
                for (let i = 0; i < addedChars.length; i++) {
                    let char = addedChars[i];
                    if (inputText.length >= targetText.length) break;
                    
                    if (char === '\n' && targetText[inputText.length] === ' ') {
                        char = ' ';
                    }
                    
                    if (char === targetText[inputText.length]) {
                        // --- CORRECT TYPING ANIMATION (PHYSICAL POP) ---
                        let el = document.getElementById('char-' + inputText.length);
                        if (el) {
                            el.style.animation = 'none';
                            el.offsetHeight; 
                            el.style.animation = 'typePop 0.25s var(--ease-spring) forwards';
                        }
                        
                        inputText += char;
                        currentErrorChar = null; 
                        SoundManager.playKey(char); 
                    } else {
                        // --- ERROR SHAKE ANIMATION ---
                        let currentIndex = inputText.length;
                        let el = document.getElementById('char-' + currentIndex);
                        if (el) {
                            el.style.animation = 'none';
                            el.offsetHeight;
                            el.style.animation = 'errorShake 0.4s var(--ease-spring) forwards';
                        }

                        if (!missedIndices.has(currentIndex)) {
                            missedIndices.add(currentIndex);
                            let expectedChar = targetText[currentIndex];
                            let trackChar = expectedChar === ' ' ? 'Space' : expectedChar === '\n' ? 'Enter' : expectedChar;
                            errorTracker[trackChar] = (errorTracker[trackChar] || 0) + 1;
                        }

                        currentErrorChar = char; 
                        totalErrors++; 
                        SoundManager.playError(); 
                        break; 
                    }
                }
            }

            elInput.value = inputText;
            updateDOMClasses();
            updateMetrics();

            if (inputText.length === targetText.length && targetText.length > 0) {
                endTest();
            }
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function buildDOM() {
            let html = '';
            let globalIndex = 0;

            let words = [];
            let currentWord = "";
            for (let i = 0; i < targetText.length; i++) {
                let char = targetText[i];
                currentWord += char;
                if (char === ' ' || char === '\n') {
                    words.push(currentWord);
                    currentWord = "";
                }
            }
            if (currentWord.length > 0) words.push(currentWord);

            for (let i = 0; i < words.length; i++) {
                let wordStr = words[i];
                let isNewLine = wordStr.endsWith('\n');

                html += `<div class="word inline-block whitespace-pre">`; 
                for (let j = 0; j < wordStr.length; j++) {
                    let char = wordStr[j];
                    let displayChar = char;
                    let extraClass = "";
                    
                    if (char === '\n') {
                        displayChar = '↵';
                        extraClass = " opacity-40";
                    }

                    let attrChar = char === '\n' ? '&#10;' : escapeHTML(char);
                    let safeDisplayChar = escapeHTML(displayChar);

                    html += `<span id="char-${globalIndex}" data-char="${attrChar}" class="char relative font-mono text-[1.4rem] tracking-wide px-[1px] rounded-[3px] text-slate-500 border-b-[3px] border-transparent transition-colors duration-150${extraClass}">${safeDisplayChar}</span>`;
                    globalIndex++;
                }
                html += `</div>`;
                
                if (isNewLine) html += `<br class="word-break">`; 
            }
            elTextDisplay.innerHTML = html;
        }

        function updateDOMClasses() {
            for (let i = 0; i < targetText.length; i++) {
                let el = document.getElementById('char-' + i);
                if (!el) continue;

                let expectedChar = el.getAttribute('data-char'); 
                let displayChar = expectedChar === '\n' ? '↵' : expectedChar;
                
                let colorClass = "text-slate-500";
                let bgClass = "bg-transparent";
                let cursorClass = "border-transparent";

                if (i < inputText.length) {
                    el.innerText = displayChar;
                    el.removeAttribute('data-error');
                    colorClass = "text-emerald-400";
                    bgClass = "bg-emerald-500/20"; 
                } else if (i === inputText.length) {
                    if (currentErrorChar !== null && status !== 'finished') {
                        el.innerText = displayChar;
                        let errorDisplay = currentErrorChar;
                        if (currentErrorChar === ' ') errorDisplay = '␣';
                        if (currentErrorChar === '\n') errorDisplay = '↵';
                        
                        el.setAttribute('data-error', errorDisplay);
                        colorClass = "text-rose-400";
                        bgClass = "bg-rose-500/20";
                        cursorClass = "cursor-active border-rose-500";
                    } else {
                        el.innerText = displayChar;
                        el.removeAttribute('data-error');
                        cursorClass = "cursor-active border-indigo-500";
                        bgClass = "bg-slate-800/80"; 
                        colorClass = "text-slate-200";
                    }
                } else {
                    el.innerText = displayChar;
                    el.removeAttribute('data-error');
                }

                // Preserve the inline transform/animations applied by the handler, only modify color classes safely
                el.className = `char relative font-mono text-[1.4rem] tracking-wide px-[1px] rounded-[3px] transition-colors duration-150 border-b-[3px] ${colorClass} ${bgClass} ${cursorClass}`;
            }

            if (status !== 'finished') {
                let words = Array.from(document.querySelectorAll('.word'));
                let brs = Array.from(document.querySelectorAll('.word-break'));
                
                // Only reset non-hidden items to prevent reflow breaks
                words.forEach(word => { if(!word.dataset.hidden) word.style.display = 'inline-block'; });
                brs.forEach(br => { if(!br.dataset.hidden) br.style.display = 'inline'; });

                if (inputText.length > 0) {
                    let activeIndex = Math.min(inputText.length, targetText.length - 1);
                    let activeCharEl = document.getElementById('char-' + activeIndex);
                    
                    if (activeCharEl) {
                        let activeWord = activeCharEl.closest('.word');
                        let activeOffset = activeWord ? activeWord.offsetTop : activeCharEl.offsetTop;
                        let wordOffsets = words.map(word => word.offsetTop);
                        
                        // --- SMOOTH LINE HIDING ANIMATION ---
                        words.forEach((word, index) => {
                            if (wordOffsets[index] < activeOffset - 15) {
                                if (!word.dataset.hidden) {
                                    word.dataset.hidden = 'true';
                                    word.style.animation = 'slideUpFade 0.4s var(--ease-out-expo) forwards';
                                    setTimeout(() => { word.style.display = 'none'; }, 400);
                                    
                                    if (word.nextElementSibling && word.nextElementSibling.classList.contains('word-break')) {
                                        let br = word.nextElementSibling;
                                        br.dataset.hidden = 'true';
                                        setTimeout(() => { br.style.display = 'none'; }, 400);
                                    }
                                }
                            }
                        });
                    }
                }
            }
        }

        function updateMetrics() {
            let acc = 100;
            // Keystroke Precision Accuracy
            let totalTyped = inputText.length + totalErrors;
            if (totalTyped > 0) acc = Math.round((inputText.length / totalTyped) * 100);

            let wpm = 0;
            let minutes = timeElapsed / 60;
            // Net WPM Calculation
            if (minutes > 0) wpm = Math.round((inputText.length / 5) / minutes);

            // Clean Time Formatting (converts 65s into 1m 5s)
            let timeStr = timeElapsed < 60 ? timeElapsed + "s" : Math.floor(timeElapsed / 60) + "m " + (timeElapsed % 60) + "s";

            // Animate only on specific value changes
            if (wpm !== lastWpm) {
                animateMetric(elWpm, wpm, 'metricSubtle 0.2s var(--ease-out-expo) forwards');
                lastWpm = wpm;
            }
            if (acc !== lastAcc) {
                animateMetric(elAcc, acc + "%", 'metricPop 0.4s var(--ease-out-expo) forwards');
                lastAcc = acc;
            }
            if (timeStr !== lastTime) {
                animateMetric(elTime, timeStr, 'metricSubtle 0.2s var(--ease-out-expo) forwards');
                lastTime = timeStr;
            }
            
            return { wpm, acc, timeStr };
        }

        function animateMetric(el, val, animationStyle) {
            el.innerText = val;
            el.style.animation = 'none';
            el.offsetHeight; // trigger hardware reflow
            el.style.animation = animationStyle;
        }

        function endTest() {
            status = 'finished';
            clearInterval(timer);
            elTypingContainer.style.animation = 'none'; // Stop breathing
            
            SoundManager.playSuccess(); 
            updateDOMClasses(); 
            
            updateMetrics(); 
            
            let feedbackEl = document.getElementById('error-feedback');
            let errorEntries = Object.entries(errorTracker);
            
            // --- CINEMATIC ACHIEVEMENT POP-IN ---
            elOverlayFinished.classList.remove('hidden');
            let finishContent = document.getElementById('finish-content');
            finishContent.style.animation = 'none';
            finishContent.offsetHeight; 
            finishContent.style.animation = 'dramaticPop 0.7s var(--ease-out-expo) forwards';

            if (errorEntries.length > 0) {
                errorEntries.sort((a, b) => b[1] - a[1]);
                let topErrors = errorEntries.slice(0, 4);
                let errorCount = topErrors.length;
                
                let gridClass = errorCount === 1 ? 'grid-cols-1 max-w-[140px]' : 
                                errorCount === 2 ? 'grid-cols-2 max-w-[280px]' : 
                                errorCount === 3 ? 'grid-cols-3 max-w-[400px]' : 
                                'grid-cols-2 sm:grid-cols-4 max-w-full';

                let paddingClass = errorCount < 3 ? 'py-4' : 'py-2 sm:py-3';
                let textSizeClass = errorCount < 3 ? 'text-3xl' : 'text-xl sm:text-2xl';

                // --- STAGGERED CASCADING CARDS ---
                let cardsHtml = topErrors.map((entry, idx) => {
                    let keyDisplay = entry[0] === ' ' ? 'Space' : entry[0] === '\n' ? 'Enter' : entry[0];
                    let misses = entry[1];
                    let delay = 0.3 + (idx * 0.1); // Stagger animation delay
                    
                    return `
                        <div style="animation: staggerCard 0.5s var(--ease-out-expo) ${delay}s both;" class="group flex flex-col items-center justify-center bg-slate-950/60 border border-slate-700/80 px-4 ${paddingClass} rounded-xl shadow-md hover:border-rose-500/50 hover:shadow-rose-500/20 hover:-translate-y-1 transition-all duration-300">
                            <kbd class="${textSizeClass} font-mono text-rose-400 font-bold drop-shadow-md group-hover:scale-110 transition-transform">${keyDisplay}</kbd>
                            <span class="text-[0.6rem] sm:text-[0.65rem] uppercase tracking-widest text-slate-400 mt-1.5 font-semibold text-center">${misses} ${misses === 1 ? 'Miss' : 'Misses'}</span>
                        </div>
                    `;
                }).join('');
                
                feedbackEl.innerHTML = `
                    <div style="animation: staggerCard 0.6s var(--ease-out-expo) 0.15s both;" class="w-full bg-slate-800/40 p-4 sm:p-5 rounded-2xl border border-slate-700/50 shadow-2xl backdrop-blur-md">
                        <div class="text-center mb-3 sm:mb-4">
                            <h4 class="text-slate-200 font-semibold text-base sm:text-lg tracking-wide drop-shadow-sm">Practice Recommendations</h4>
                            <p class="text-slate-400 text-[0.8rem] sm:text-[0.85rem] mt-1">To improve your accuracy, we recommend focusing on these specific keys:</p>
                        </div>
                        <div class="grid gap-3 sm:gap-4 mx-auto ${gridClass}">
                            ${cardsHtml}
                        </div>
                    </div>
                `;
                feedbackEl.classList.remove('hidden');
            } else {
                feedbackEl.innerHTML = `
                    <div style="animation: staggerCard 0.6s var(--ease-out-expo) 0.2s both;" class="flex items-center justify-center gap-3 text-emerald-400 bg-emerald-500/10 p-4 sm:p-5 rounded-2xl border border-emerald-500/20 shadow-2xl backdrop-blur-md">
                        <svg class="drop-shadow-md" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
                        <p class="font-semibold text-[1rem] drop-shadow-sm">Flawless typing! You made zero errors.</p>
                    </div>
                `;
                feedbackEl.classList.remove('hidden');
            }

            elTypingContainer.classList.remove('border-[3px]', 'border-slate-800');
            elTypingContainer.classList.add('border-emerald-500/30', 'bg-emerald-500/5');
            elInput.blur();
        }

        function resetTest() {
            status = 'hidden';
            inputText = "";
            timeElapsed = 0;
            currentErrorChar = null;
            totalErrors = 0;
            lastWpm = -1;
            lastAcc = -1;
            lastTime = "";
            errorTracker = {};
            missedIndices.clear(); 
            clearInterval(timer);
            elInput.value = "";
            elTypingContainer.style.animation = 'none';
            
            document.getElementById('error-feedback').classList.add('hidden');
            
            buildDOM();
            updateDOMClasses();
            updateMetrics();
            
            elOverlayIdle.classList.remove('hidden');
            elOverlayIdle.style.animation = 'none'; // reset idle reveal
            elOverlayFinished.classList.add('hidden');
            
            // --- INSTANTLY RE-BLUR TEXT ---
            elTextDisplay.style.transition = 'none';
            elTextDisplay.style.filter = 'blur(7px)';
            elTextDisplay.style.opacity = '0.4';
            
            elTypingContainer.classList.remove('border-emerald-500/30', 'bg-emerald-500/5');
            elTypingContainer.classList.add('border-[3px]', 'border-slate-800');
            
            setTimeout(() => elInput.focus(), 50);
        }

        function switchMode(newMode) {
            let oldView = newMode === 'practice' ? viewCustom : viewPractice;
            let targetView = newMode === 'practice' ? viewPractice : viewCustom;

            oldView.classList.add('hidden');
            oldView.classList.remove('view-enter');
            
            targetView.classList.remove('hidden');
            // Re-trigger the enter animation
            targetView.style.animation = 'none';
            targetView.offsetHeight;
            targetView.style.animation = '';
            targetView.classList.add('view-enter');

            if (newMode === 'practice') {
                document.getElementById('nav-practice').classList.add('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-500/20');
                document.getElementById('nav-practice').classList.remove('text-slate-400', 'hover:bg-slate-800', 'hover:text-slate-200');
                document.getElementById('nav-custom').classList.remove('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-500/20');
                document.getElementById('nav-custom').classList.add('text-slate-400', 'hover:bg-slate-800', 'hover:text-slate-200');
                resetTest();
            } else {
                document.getElementById('nav-custom').classList.add('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-500/20');
                document.getElementById('nav-custom').classList.remove('text-slate-400', 'hover:bg-slate-800', 'hover:text-slate-200');
                document.getElementById('nav-practice').classList.remove('bg-indigo-600', 'text-white', 'shadow-lg', 'shadow-indigo-500/20');
                document.getElementById('nav-practice').classList.add('text-slate-400', 'hover:bg-slate-800', 'hover:text-slate-200');
                customTextarea.value = targetText;
                customTextarea.focus();
            }
        }

        // Boot
        init();
    </script>
</body>
</html>
